<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Super Trunfo - Dia 8</title>

  <body>
  <html>

<head>
    <title>
       Jogo Poderes das Cartas
    </title>
</head>

<body>
    <div class="container">
        
        <h1 class="page-title">?</h1> <!--Coloque o titulo do jogo-->
        <button onclick="sortearCarta()" id="btnSortear">?</button> <!--Coloque sortear carta no botão-->

        <form id="form">
            <h2>?</h2> <!--Coloque o titulo "Escolha seu atributo" do jogo-->
            <div class="wrapper">
                <div>
                    <div id="carta-jogador"> <!--Carta esquerda, jogador-->
                        <img src="https://www.alura.com.br/assets/img/imersoes/dev-2021/card-super-trunfo-transparent-ajustado.png"
                            style=" width: inherit; height: inherit; position: absolute;">
                        <h3></h3>
                    </div>
                </div>
                <div> 
                    <div id="carta-maquina" class="carta"> <!--Carta direita, computador-->
                        <img 
                            src="https://www.alura.com.br/assets/img/imersoes/dev-2021/card-super-trunfo-transparent-ajustado.png"
                            style=" width: inherit; height: inherit; position: absolute;"></div>
                </div>
            </div>
            <button class="button-jogar" type="button" id="btnJogar" onclick="jogar()" disabled="false">?</button> <!--Coloque Jogar no botão-->

            <div id="resultado"></div> <!--resultado da partida-->

        </form>
    </div>
</body>

</html>
    <script  src="./script.js"></script>

  </body>
